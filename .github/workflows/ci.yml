name: CI

on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Show toolchain
        run: rustc --version && cargo --version

      - name: Create dummy initramfs for type checking
        run: mkdir -p build && touch build/dummy-for-lint.initramfs

      - name: cargo check
        run: INITRAMFS_PATH=build/dummy-for-lint.initramfs cargo check

      - name: clippy
        run: INITRAMFS_PATH=build/dummy-for-lint.initramfs cargo clippy -- -D warnings
        continue-on-error: true  # TODO: fix all warnings then make this strict

      - name: rustfmt
        run: cargo fmt --check
        continue-on-error: true  # TODO: format codebase then make this strict
